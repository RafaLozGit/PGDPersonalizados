<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>Lista de Produtos</h1>

<a href="/produto/">Cadastrar novo produto</a>

<ul>
    {% for produto in produtos %}
        <li>
            {{ produto.nome }} - R$ {{ produto.preco }}

            <a href="{% url 'editar_produto' produto.id %}">Editar</a>

            <a href="{% url 'excluir_produto' produto.id %}">
                Excluir
            </a>
        </li>
    {% endfor %}
</ul>

</body>
</html>
