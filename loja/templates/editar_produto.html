<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>Editar Produto</h1>

<form method="post">
    {% csrf_token %}

    Nome: <input type="text" name="nome" value="{{ produto.nome }}"><br>
    Preço: <input type="number" step="0.01" name="preco" value="{{ produto.preco }}"><br>

    <button type="submit">Salvar</button>
</form>

</body>
</html>
